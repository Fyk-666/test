<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - 数字合并游戏</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at top left, rgba(255,255,255,0.1) 0%, transparent 50%),
                        radial-gradient(ellipse at bottom right, rgba(255,255,255,0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .game-container {
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .game-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .game-header h1 {
            font-size: 4rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: 8px;
            margin-bottom: 10px;
        }

        .game-header p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.85);
        }

        .game-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 12px 25px;
            text-align: center;
            min-width: 100px;
        }

        .stat-label {
            display: block;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-value {
            display: block;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }

        .game-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .game-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(12px);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .game-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .game-board {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .tile {
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 800;
            transition: all 0.15s ease;
        }

        .tile-empty {
            background: rgba(255, 255, 255, 0.08);
        }

        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 1.9rem; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 1.9rem; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 1.9rem; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 1.5rem; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 1.5rem; box-shadow: 0 0 30px rgba(237, 194, 46, 0.5); }
        .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 1.3rem; }

        .tile-new {
            animation: appear 0.2s ease;
        }

        .tile-merged {
            animation: pop 0.2s ease;
        }

        @keyframes appear {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .game-instructions {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-top: 25px;
            text-align: center;
        }

        .game-instructions h3 {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .game-instructions p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.95rem;
            margin: 8px 0;
        }

        .game-instructions strong {
            color: #fff;
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .game-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .game-overlay.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .overlay-content {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .overlay-content h2 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 15px;
        }

        .overlay-content p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 25px;
        }

        .win-overlay .overlay-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .win-overlay h2, .win-overlay p {
            color: #fff;
        }

        .win-overlay .game-btn {
            background: #fff;
            color: #764ba2;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 480px) {
            .game-header h1 {
                font-size: 3rem;
                letter-spacing: 5px;
            }

            .game-board {
                gap: 8px;
                padding: 10px;
            }

            .tile {
                font-size: 1.6rem;
            }

            .tile-128, .tile-256, .tile-512 {
                font-size: 1.3rem;
            }

            .tile-1024, .tile-2048 {
                font-size: 1rem;
            }

            .stat-box {
                padding: 10px 18px;
                min-width: 85px;
            }

            .stat-value {
                font-size: 1.3rem;
            }

            .back-btn {
                top: 15px;
                left: 15px;
                padding: 10px 16px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <a href="games.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> 返回游戏
    </a>

    <div class="game-container">
        <div class="game-header">
            <h1>2048</h1>
            <p>合并数字方块，达到2048！</p>
        </div>
        
        <div class="game-stats">
            <div class="stat-box">
                <span class="stat-label">分数</span>
                <span class="stat-value" id="score">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">最高分</span>
                <span class="stat-value" id="best-score">0</span>
            </div>
        </div>

        <div class="game-controls">
            <button class="game-btn" onclick="initGame()">
                <i class="fas fa-redo"></i> 新游戏
            </button>
            <button class="game-btn" onclick="undoMove()">
                <i class="fas fa-undo"></i> 撤销
            </button>
        </div>

        <div class="game-board" id="game-board"></div>

        <div class="game-instructions">
            <h3><i class="fas fa-info-circle"></i> 操作说明</h3>
            <p>使用 <strong>方向键</strong> 或 <strong>WASD</strong> 移动方块</p>
            <p>相同数字相遇时会合并</p>
            <p>达到 <strong>2048</strong> 即获胜！</p>
        </div>

        <div class="game-overlay" id="game-overlay">
            <div class="overlay-content">
                <h2 id="overlay-title">游戏结束</h2>
                <p id="overlay-message">得分: <span id="final-score">0</span></p>
                <button class="game-btn" onclick="initGame()">
                    <i class="fas fa-redo"></i> 再来一局
                </button>
            </div>
        </div>
    </div>

    <script>
        const GRID_SIZE = 4;
        let board = [];
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('2048-best')) || 0;
        let previousBoard = null;
        let previousScore = null;
        let gameOver = false;
        let gameWon = false;

        function initGame() {
            board = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(0));
            score = 0;
            previousBoard = null;
            previousScore = null;
            gameOver = false;
            gameWon = false;
            
            document.getElementById('game-overlay').classList.remove('active', 'win-overlay');
            document.getElementById('best-score').textContent = bestScore;
            
            addNewTile();
            addNewTile();
            updateBoard();
        }

        function addNewTile() {
            const emptyTiles = [];
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (board[r][c] === 0) {
                        emptyTiles.push({ r, c });
                    }
                }
            }
            
            if (emptyTiles.length > 0) {
                const { r, c } = emptyTiles[Math.floor(Math.random() * emptyTiles.length)];
                board[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function updateBoard() {
            const gameBoard = document.getElementById('game-board');
            gameBoard.innerHTML = '';
            
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    
                    const value = board[r][c];
                    if (value === 0) {
                        tile.classList.add('tile-empty');
                    } else {
                        tile.classList.add(`tile-${value > 2048 ? 'super' : value}`);
                        tile.textContent = value;
                    }
                    
                    gameBoard.appendChild(tile);
                }
            }
            
            document.getElementById('score').textContent = score;
            
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('2048-best', bestScore);
                document.getElementById('best-score').textContent = bestScore;
            }
        }

        function saveState() {
            previousBoard = board.map(row => [...row]);
            previousScore = score;
        }

        function undoMove() {
            if (previousBoard && !gameOver) {
                board = previousBoard.map(row => [...row]);
                score = previousScore;
                previousBoard = null;
                previousScore = null;
                updateBoard();
                document.getElementById('game-overlay').classList.remove('active', 'win-overlay');
            }
        }

        function move(direction) {
            if (gameOver) return;
            
            saveState();
            let moved = false;
            
            const rotateBoard = (times) => {
                for (let t = 0; t < times; t++) {
                    const newBoard = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(0));
                    for (let r = 0; r < GRID_SIZE; r++) {
                        for (let c = 0; c < GRID_SIZE; c++) {
                            newBoard[c][GRID_SIZE - 1 - r] = board[r][c];
                        }
                    }
                    board = newBoard;
                }
            };
            
            const slide = () => {
                let hasMoved = false;
                for (let r = 0; r < GRID_SIZE; r++) {
                    let row = board[r].filter(val => val !== 0);
                    
                    for (let i = 0; i < row.length - 1; i++) {
                        if (row[i] === row[i + 1]) {
                            row[i] *= 2;
                            score += row[i];
                            row[i + 1] = 0;
                            
                            if (row[i] === 2048 && !gameWon) {
                                gameWon = true;
                                setTimeout(() => showOverlay(true), 300);
                            }
                        }
                    }
                    
                    row = row.filter(val => val !== 0);
                    while (row.length < GRID_SIZE) {
                        row.push(0);
                    }
                    
                    if (board[r].join(',') !== row.join(',')) {
                        hasMoved = true;
                    }
                    board[r] = row;
                }
                return hasMoved;
            };
            
            switch (direction) {
                case 'left':
                    moved = slide();
                    break;
                case 'right':
                    rotateBoard(2);
                    moved = slide();
                    rotateBoard(2);
                    break;
                case 'up':
                    rotateBoard(3);
                    moved = slide();
                    rotateBoard(1);
                    break;
                case 'down':
                    rotateBoard(1);
                    moved = slide();
                    rotateBoard(3);
                    break;
            }
            
            if (moved) {
                addNewTile();
                updateBoard();
                
                if (!gameWon && isGameOver()) {
                    setTimeout(() => showOverlay(false), 300);
                }
            } else {
                previousBoard = null;
                previousScore = null;
            }
        }

        function isGameOver() {
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (board[r][c] === 0) return false;
                    if (c < GRID_SIZE - 1 && board[r][c] === board[r][c + 1]) return false;
                    if (r < GRID_SIZE - 1 && board[r][c] === board[r + 1][c]) return false;
                }
            }
            gameOver = true;
            return true;
        }

        function showOverlay(won) {
            const overlay = document.getElementById('game-overlay');
            const title = document.getElementById('overlay-title');
            
            if (won) {
                overlay.classList.add('win-overlay');
                title.textContent = '🎉 恭喜获胜！';
            } else {
                overlay.classList.remove('win-overlay');
                title.textContent = '游戏结束';
            }
            
            document.getElementById('final-score').textContent = score;
            overlay.classList.add('active');
        }

        document.addEventListener('keydown', (e) => {
            const keyMap = {
                'ArrowLeft': 'left',
                'ArrowRight': 'right',
                'ArrowUp': 'up',
                'ArrowDown': 'down',
                'a': 'left',
                'd': 'right',
                'w': 'up',
                's': 'down'
            };
            
            if (keyMap[e.key]) {
                e.preventDefault();
                move(keyMap[e.key]);
            }
        });

        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            const minSwipe = 50;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > minSwipe) {
                    move(dx > 0 ? 'right' : 'left');
                }
            } else {
                if (Math.abs(dy) > minSwipe) {
                    move(dy > 0 ? 'down' : 'up');
                }
            }
        });

        initGame();
    </script>
</body>
</html>
