<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>班级私信 - 班级网站</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
    <script src="static/js/auth.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* --- 聊天页面特定样式 --- */
        .chat-page {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
        }
        
        /* --- 主容器 --- */
        .chat-container {
            width: 95%; max-width: 1100px; height: 85vh;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            display: flex;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            position: relative;
        }

        /* --- 左侧用户列表 --- */
        .user-list-panel {
            width: 280px;
            background: #f7f7f7;
            border-right: 1px solid #e0e0e0;
            display: flex; flex-direction: column;
            transition: transform 0.3s ease;
        }
        .panel-header { padding: 20px; background: #f7f7f7; }
        .search-box { position: relative; }
        .search-box input {
            width: 100%; padding: 10px 30px 10px 12px;
            border: 1px solid #ddd; border-radius: 8px;
            background: #e9e9e9; outline: none; font-size: 0.95rem;
        }
        .search-box input:focus { background: white; border-color: #667eea; }
        .search-box i { position: absolute; right: 10px; top: 12px; color: #999; }

        .user-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        
        /* 新增: 设为相对定位，作为红点的基准 */
        .user-item {
            padding: 15px; cursor: pointer;
            display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid #f0f0f0;
            background: #fff;
            position: relative; 
        }
        .user-item:active { background: #eef2ff; }
        .user-item.active { background: #dce4ff; border-left: 4px solid #667eea; }
        
        .user-avatar {
            width: 45px; height: 45px; background: #ddd; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; color: #fff; font-weight: bold; flex-shrink: 0;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
        }
        
        .user-info { flex: 1; min-width: 0; }
        .user-name { font-weight: 600; font-size: 0.95rem; color: #333; }
        .user-role { font-size: 0.75rem; color: #999; margin-top: 2px; }

        /* --- 新增：未读消息红点徽章 --- */
        .unread-badge {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: #ff4757;
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 2px 7px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(255, 71, 87, 0.4);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none; /* 防止遮挡点击事件 */
        }

        @keyframes popIn {
            0% { transform: translateY(-50%) scale(0); opacity: 0; }
            100% { transform: translateY(-50%) scale(1); opacity: 1; }
        }

        /* --- 右侧聊天窗口 --- */
        .chat-window { 
            flex: 1; display: flex; flex-direction: column; background: #fff; 
            min-width: 0;
        }
        .chat-header {
            padding: 15px; border-bottom: 1px solid #eee;
            font-weight: bold; font-size: 1.1rem; color: #333;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 10;
        }
        
        #mobileBackBtn { display: none; font-size: 1.2rem; color: #667eea; padding: 5px; cursor: pointer; }

        .messages-area {
            flex: 1; padding: 15px; overflow-y: auto; -webkit-overflow-scrolling: touch;
            background: #f5f5f5; 
            display: flex; flex-direction: column; gap: 10px;
        }

        /* --- 气泡样式 --- */
        .message-bubble {
            max-width: 85%; padding: 10px 14px; border-radius: 12px;
            font-size: 1rem; line-height: 1.5; position: relative;
            word-wrap: break-word; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .msg-content-text { white-space: pre-wrap; display: block; margin-bottom: 4px; }
        
        .msg-left { align-self: flex-start; background: #ffffff; color: #333; border: 1px solid #ededed; border-bottom-left-radius: 2px; }
        .msg-right { align-self: flex-end; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-bottom-right-radius: 2px; }

        /* 日期分割线 */
        .date-divider { text-align: center; margin: 15px 0; }
        .date-divider span { background: rgba(0,0,0,0.1); color: #666; padding: 4px 12px; border-radius: 12px; font-size: 0.75rem; }

        /* 消息状态 */
        .msg-meta { display: flex; align-items: center; justify-content: flex-end; gap: 5px; font-size: 0.7rem; opacity: 0.8; }
        .msg-left .msg-meta { justify-content: flex-start; color: #999; }
        .msg-right .msg-meta { color: rgba(255,255,255,0.9); }
        .msg-time { cursor: pointer; border-bottom: 1px dotted transparent; }
        .msg-time:hover { border-bottom-color: currentColor; }

        /* 悬浮按钮区 */
        .copy-btn, .recall-btn {
            position: absolute; top: -20px; opacity: 0; pointer-events: none;
            color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; transition: 0.2s; cursor: pointer;
        }
        .copy-btn { background: #333; right: 10px; }
        .recall-btn { background: #ff4757; right: 50px; }
        .message-bubble:hover .copy-btn, .message-bubble:hover .recall-btn { opacity: 1; pointer-events: auto; top: -25px; }

        .msg-status { font-size: 0.7rem; }
        .msg-status.read { color: #54a0ff; }
        .msg-status.sent { color: rgba(255,255,255,0.7); }
        .retry-btn { color: #ff4757; cursor: pointer; font-weight: bold; margin-right: 5px; background: white; padding: 2px 6px; border-radius: 4px; }

        /* --- 底部输入区 --- */
        .input-area {
            padding: 10px; border-top: 1px solid #eee; background: white;
            display: flex; gap: 10px; align-items: flex-end;
        }
        .textarea-wrapper {
            flex: 1; background: #f5f5f5; border-radius: 20px;
            padding: 10px 15px; border: 1px solid #e0e0e0;
        }
        #msgInput {
            width: 100%; border: none; background: transparent; outline: none;
            resize: none; font-size: 1rem; line-height: 1.4; max-height: 100px;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        #sendBtn {
            width: 70px; height: 42px; border-radius: 20px; border: none;
            background: #667eea; color: white; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
        }
        @media (hover: hover) { #sendBtn:hover { background: #5a6fd6; transform: scale(1.05); } }
        #sendBtn:active { background: #4a5db6; transform: scale(0.95); }
        #sendBtn:disabled { background: #e0e0e0; color: #999; transform: none; }

        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 3px; }

        /* --- 移动端响应式布局 --- */
        @media (max-width: 768px) {
            .chat-container { width: 100%; height: 100%; border-radius: 0; }
            .user-list-panel { width: 100%; display: flex; }
            .chat-window { display: none; width: 100%; }
            .chat-container.chat-active .user-list-panel { display: none; }
            .chat-container.chat-active .chat-window { display: flex; }
            #mobileBackBtn { display: block; }
            .message-bubble { max-width: 85%; }
            .input-area { padding: 8px; }
        }
    </style>
</head>
<body>

    <!-- 导航栏 -->
    <nav>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-graduation-cap"></i>
                <span>班级网站</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="article_list.html">班级公告</a></li>
                <li><a href="toolbox.html">工具箱</a></li>
                <li><a href="article.html">发文章</a></li>
                <li><a href="gallery.html">班级相册</a></li>
            </ul>
            <div class="user-section">
                <div class="user-info">
                    <span class="user-display-name" id="usernameDisplay"></span>
                    <span class="welcome-message" id="welcomeMessage"></span>
                </div>
                <div class="user-actions">
                    <a href="login.html" class="btn login-btn" id="loginBtn">登录</a>
                    <a href="register.html" class="btn register-btn" id="registerBtn">注册</a>
                    <a href="#" class="btn logout-btn" id="logoutBtn" style="display: none;">退出</a>
                </div>
            </div>
            <button class="mobile-toggle">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <div class="chat-page">
        <div class="chat-container" id="chatContainer">
            <!-- 左侧列表 -->
            <div class="user-list-panel">
                <div class="panel-header">
                    <div style="margin-bottom:10px; font-weight:bold; color:#667eea; display:flex; justify-content:space-between;">
                        <span><i class="fas fa-comments"></i> 班级通讯录</span>
                    </div>
                    <div class="search-box">
                        <input type="text" id="userSearch" placeholder="搜索联系人...">
                        <i class="fas fa-search"></i>
                    </div>
                </div>
                <div class="user-list" id="userList">
                    <div style="padding:20px; text-align:center; color:#999;">
                        <i class="fas fa-spinner fa-spin"></i> 加载中...
                    </div>
                </div>
            </div>

            <!-- 右侧聊天 -->
            <div class="chat-window">
                <div class="chat-header">
                    <i class="fas fa-chevron-left" id="mobileBackBtn" onclick="exitChat()"></i>
                    <span id="chatHeaderTitle">请选择联系人</span>
                </div>
                
                <div class="messages-area" id="msgArea">
                    <div style="text-align:center; margin-top:50px; color:#ccc;">
                        <i class="fas fa-paper-plane" style="font-size:3rem; margin-bottom:10px;"></i>
                        <p>选择左侧好友开始聊天</p>
                    </div>
                </div>

                <div class="input-area">
                    <div class="textarea-wrapper">
                        <textarea id="msgInput" rows="1" placeholder="发送消息..." disabled></textarea>
                    </div>
                    <button id="sendBtn" disabled><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚省略... -->

    <script>
        const API_BASE = "https://kczx.pythonanywhere.com/api";
        let currentReceiverId = null;
        let globalTimer = null; // 新增：全局大管家定时器
        let myId = null; 
        let allUsers =[];

        function parseJwt(token) {
            try { return JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/'))); } 
            catch (e) { return null; }
        }

        // 1. 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) {
                alert("请先登录");
                window.location.href = 'login.html'; 
                return;
            }
            const user = parseJwt(token);
            if (user) myId = user.user_id; 
            
            await loadUserList();

            // 启动全局心跳雷达：每3秒同时侦测未读红点和最新消息
            globalTimer = setInterval(pollGlobalData, 3000);

            // 绑定发送事件
            document.getElementById('sendBtn').addEventListener('click', () => sendMessage());
            document.getElementById('msgInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            document.getElementById('userSearch').addEventListener('input', (e) => {
                renderUserList(e.target.value.trim());
            });
            
            const textarea = document.getElementById('msgInput');
            textarea.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });
        });

        // --- 全局雷达扫描 (获取红点 + 刷新聊天记录) ---
        async function pollGlobalData() {
            // 1. 扫描未读消息数量，画红点
            try {
                const res = await fetch(`${API_BASE}/messages/unread`, {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                });
                if (res.ok) {
                    const unreadCounts = await res.json();
                    
                    document.querySelectorAll('.user-item').forEach(el => {
                        const uid = el.getAttribute('data-uid');
                        let badge = el.querySelector('.unread-badge');
                        const count = unreadCounts[uid] || 0;
                        
                        // 规则：有未读消息，且目前没有打开跟这个人的聊天框，就亮红点
                        if (count > 0 && String(uid) !== String(currentReceiverId)) {
                            if (!badge) {
                                badge = document.createElement('div');
                                badge.className = 'unread-badge';
                                el.appendChild(badge);
                            }
                            badge.innerText = count > 99 ? '99+' : count;
                        } else {
                            if (badge) badge.remove();
                        }
                    });
                }
            } catch (e) {
                console.error("获取红点失败", e);
            }

            // 2. 刷新当前的聊天记录
            if (currentReceiverId) {
                loadMessages();
            }
        }

        // --- 视图切换 ---
        function selectUser(uid, name, el) {
            currentReceiverId = uid;
            document.getElementById('chatHeaderTitle').innerText = name;
            
            document.querySelectorAll('.user-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');

            // 体验优化：点进去的一瞬间，直接拔掉红点
            const badge = el.querySelector('.unread-badge');
            if (badge) badge.remove();

            const input = document.getElementById('msgInput');
            input.disabled = false;
            document.getElementById('sendBtn').disabled = false;

            document.getElementById('chatContainer').classList.add('chat-active');
            
            // 立即加载消息，不干等轮询
            loadMessages();
        }

        window.exitChat = function() {
            document.getElementById('chatContainer').classList.remove('chat-active');
            currentReceiverId = null; // 退出聊天后，再收到消息就会正常亮红点
        };

        // --- 业务逻辑 ---
        async function loadUserList() {
            try {
                const res = await fetch(`${API_BASE}/members`, {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                });
                if (!res.ok) throw new Error("Load Failed");
                const data = await res.json();
                allUsers = data.users || data;
                renderUserList();
                pollGlobalData(); // 首次加载完列表后立刻查一次红点
            } catch (e) { 
                document.getElementById('userList').innerHTML = '<div style="padding:20px;text-align:center;">加载失败</div>';
            }
        }

        function renderUserList(keyword = '') {
            const container = document.getElementById('userList');
            container.innerHTML = '';
            const filtered = allUsers.filter(u => {
                if (String(u.id) === String(myId)) return false;
                const name = u.display_name || u.username;
                return name.toLowerCase().includes(keyword.toLowerCase());
            });

            filtered.forEach(u => {
                const name = u.display_name || u.username;
                const el = document.createElement('div');
                el.className = `user-item ${currentReceiverId === u.id ? 'active' : ''}`;
                
                // 极其重要：绑定 data-uid 用于查找并放置红点
                el.setAttribute('data-uid', u.id); 

                el.innerHTML = `
                    <div class="user-avatar">${name[0].toUpperCase()}</div>
                    <div class="user-info">
                        <div class="user-name">${name}</div>
                        <div class="user-role">${u.level > 1 ? '管理员' : '成员'}</div>
                    </div>
                `;
                el.onclick = () => selectUser(u.id, name, el);
                container.appendChild(el);
            });
        }

        // --- 时间与消息加载 (保持不变) ---
        function formatTimeDisplay(dateString, type = 'smart') {
            const date = new Date(dateString.endsWith('Z') ? dateString : dateString + 'Z');
            const now = new Date();
            const diffMins = Math.floor((now - date) / 60000);
            const absoluteTime = date.toLocaleTimeString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false, hour: '2-digit', minute: '2-digit' });

            if (type === 'absolute') return absoluteTime;
            if (diffMins < 1) return '刚刚';
            if (diffMins < 60) return `${diffMins}分钟前`;
            return absoluteTime;
        }

        function toggleTime(element, dateString) {
            const currentText = element.innerText;
            const absoluteTime = new Date(dateString.endsWith('Z') ? dateString : dateString + 'Z').toLocaleTimeString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false, hour: '2-digit', minute: '2-digit' });
            element.innerText = (currentText.includes('前') || currentText === '刚刚') ? absoluteTime : formatTimeDisplay(dateString);
        }

        async function loadMessages() {
            if (!currentReceiverId) return;
            try {
                const res = await fetch(`${API_BASE}/messages/history/${currentReceiverId}`, {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                });
                const msgs = await res.json();
                const msgArea = document.getElementById('msgArea');
                
                if (msgArea.getAttribute('data-len') == msgs.length) return;
                msgArea.setAttribute('data-len', msgs.length);
                msgArea.innerHTML = '';

                let lastDateStr = '';
                msgs.forEach(msg => {
                    const isMe = (String(msg.sender_id) === String(myId));
                    const msgDate = new Date(msg.created_at.endsWith('Z') ? msg.created_at : msg.created_at + 'Z');
                    const dateStr = msgDate.toLocaleDateString('zh-CN', {timeZone: 'Asia/Shanghai'});
                    
                    if (dateStr !== lastDateStr) {
                        const todayStr = new Date().toLocaleDateString('zh-CN', {timeZone: 'Asia/Shanghai'});
                        msgArea.innerHTML += `<div class="date-divider"><span>${dateStr === todayStr ? '今天' : dateStr}</span></div>`;
                        lastDateStr = dateStr;
                    }

                    const statusIcon = isMe ? (msg.is_read ? '<i class="fas fa-check-double msg-status read"></i>' : '<i class="fas fa-check msg-status sent"></i>') : '';
                    let copyBtnHtml = `<div class="copy-btn" onclick="copyText(this)">复制</div>`;
                    let recallBtnHtml = isMe ? `<div class="recall-btn" onclick="recallMessage(${msg.id})">撤回</div>` : '';
                    
                    const bubble = document.createElement('div');
                    bubble.className = `message-bubble ${isMe ? 'msg-right' : 'msg-left'}`;
                    bubble.innerHTML = `${copyBtnHtml}${recallBtnHtml}<div class="msg-content-text">${msg.content}</div><div class="msg-meta"><span class="msg-time" onclick="toggleTime(this, '${msg.created_at}')">${formatTimeDisplay(msg.created_at)}</span>${statusIcon}</div>`;
                    msgArea.appendChild(bubble);
                });
                msgArea.scrollTop = msgArea.scrollHeight;
            } catch (e) { console.error(e); }
        }

        function copyText(btnElement) {
            const text = btnElement.nextElementSibling.nextElementSibling.innerText;
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btnElement.innerText;
                btnElement.innerText = '已复制';
                setTimeout(() => btnElement.innerText = originalText, 1000);
            });
        }

        async function sendMessage(retryContent = null) {
            const input = document.getElementById('msgInput');
            const content = retryContent || input.value.trim();
            if (!content || !currentReceiverId) return;

            input.value = ''; input.style.height = 'auto';

            const msgArea = document.getElementById('msgArea');
            const temp = document.createElement('div');
            temp.className = 'message-bubble msg-right';
            temp.innerHTML = `<div class="msg-content-text">${content}</div><div class="msg-meta"><span>发送中...</span><i class="fas fa-spinner fa-spin msg-status"></i></div>`;
            msgArea.appendChild(temp);
            msgArea.scrollTop = msgArea.scrollHeight;

            try {
                const res = await fetch(`${API_BASE}/messages/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('token') },
                    body: JSON.stringify({ receiver_id: currentReceiverId, content: content })
                });
                if (res.ok) {
                    loadMessages();
                    temp.remove();
                } else { throw new Error(); }
            } catch (e) {
                temp.innerHTML = `<div class="msg-content-text">${content}</div><div class="msg-meta" style="color:#ff4757"><span class="retry-btn" onclick="retrySend(this, '${content.replace(/'/g, "\\'")}')">重试</span><span>发送失败</span></div>`;
            }
        }

        function retrySend(btn, content) {
            btn.closest('.message-bubble').remove();
            sendMessage(content);
        }

        window.recallMessage = async function(mid) {
            if(!confirm("确定要撤回这条消息吗？")) return;
            try {
                const res = await fetch(`${API_BASE}/messages/recall/${mid}`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                });
                if(res.ok) loadMessages();
            } catch(e) { alert("网络错误"); }
        }
    </script>
</body>
</html>
