<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找回密码 | ClassLink</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="stylesheet" href="static/css/forgot_password.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <main class="page-center">
        <div class="reset-card">
            <div class="reset-header">
                <div class="brand-mark">
                    <span class="material-icons">lock_reset</span>
                </div>
                <div>
                    <h1>找回密码</h1>
                    <p>验证用户名和邮箱后即可修改密码</p>
                </div>
            </div>

            <div id="statusMessage" class="status-message" style="display: none;"></div>

            <section id="verifySection">
                <h2 class="section-title">身份验证</h2>
                <form id="verifyForm" class="form">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <div class="input-wrapper">
                            <span class="material-icons">person</span>
                            <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email">邮箱</label>
                        <div class="input-wrapper">
                            <span class="material-icons">mail</span>
                            <input type="email" id="email" name="email" placeholder="请输入注册邮箱" required>
                        </div>
                    </div>
                    <button type="submit" class="action-btn">验证身份</button>
                </form>
            </section>

            <section id="resetSection" style="display: none;">
                <h2 class="section-title">设置新密码</h2>
                <form id="resetForm" class="form">
                    <div class="form-group">
                        <label for="newPassword">新密码</label>
                        <div class="input-wrapper">
                            <span class="material-icons">vpn_key</span>
                            <input type="password" id="newPassword" name="newPassword" placeholder="请输入新密码" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">确认新密码</label>
                        <div class="input-wrapper">
                            <span class="material-icons">verified</span>
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请再次输入新密码" required>
                        </div>
                    </div>
                    <button type="submit" class="action-btn">确认修改</button>
                    <button type="button" id="backToVerify" class="secondary-btn">重新验证</button>
                </form>
            </section>

            <div class="reset-footer">
                <a href="login.html" class="link">返回登录</a>
                <span class="divider">|</span>
                <a href="register.html" class="link">注册账号</a>
            </div>
        </div>
    </main>

    <script src="static/js/path-utils.js"></script>
    <script src="static/js/forgot_password.js"></script>
</body>
</html>
