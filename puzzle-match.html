<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方块消除 - 小游戏中心</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-bg-hover: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-blur: blur(12px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--primary-gradient);
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at top left, rgba(255,255,255,0.1) 0%, transparent 50%),
                        radial-gradient(ellipse at bottom right, rgba(255,255,255,0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .game-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 导航返回 */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            z-index: 100;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-3px);
        }

        /* 游戏标题 */
        .game-title {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            letter-spacing: 3px;
        }

        /* 游戏信息栏 */
        .game-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 450px;
            margin-bottom: 20px;
            gap: 20px;
        }

        .info-box {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 15px 20px;
            text-align: center;
        }

        .info-box .label {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .info-box .value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .score-value {
            color: #ffd700;
        }

        .level-value {
            color: #2ecc71;
        }

        /* 游戏棋盘 */
        .game-board {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: var(--glass-blur);
            border: 2px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
        }

        .cell {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .cell:hover {
            transform: scale(1.08);
            z-index: 10;
        }

        .cell.selected {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
            z-index: 10;
        }

        .cell.matched {
            animation: pop 0.3s ease forwards;
        }

        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); }
            100% { transform: scale(0); opacity: 0; }
        }

        .cell.falling {
            animation: fall 0.3s ease;
        }

        @keyframes fall {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* 方块颜色 */
        .block-red { background: linear-gradient(135deg, #ff6b6b, #ee5a24); box-shadow: 0 4px 15px rgba(238, 90, 36, 0.4); }
        .block-blue { background: linear-gradient(135deg, #54a0ff, #2e86de); box-shadow: 0 4px 15px rgba(46, 134, 222, 0.4); }
        .block-green { background: linear-gradient(135deg, #2ecc71, #27ae60); box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4); }
        .block-yellow { background: linear-gradient(135deg, #f1c40f, #f39c12); box-shadow: 0 4px 15px rgba(243, 156, 18, 0.4); }
        .block-purple { background: linear-gradient(135deg, #a855f7, #8b5cf6); box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }
        .block-orange { background: linear-gradient(135deg, #ff9f43, #ee8a2e); box-shadow: 0 4px 15px rgba(238, 138, 46, 0.4); }

        /* 控制按钮 */
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 25px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: white;
            color: #764ba2;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .btn-glass {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            backdrop-filter: var(--glass-blur);
        }

        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* 消除特效 */
        .combo-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            pointer-events: none;
            z-index: 1000;
            animation: comboAnim 0.8s ease forwards;
        }

        @keyframes comboAnim {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            30% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        /* 游戏结束弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            animation: modalIn 0.4s ease;
        }

        @keyframes modalIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-content h2 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .modal-content .final-score {
            font-size: 4rem;
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        .modal-content .stats {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        /* 步数警告 */
        .warning {
            animation: shake 0.5s ease infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* 响应式 */
        @media (max-width: 500px) {
            .cell {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }

            .board {
                gap: 4px;
            }

            .game-board {
                padding: 10px;
            }

            .game-title {
                font-size: 1.8rem;
            }

            .info-box .value {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <a href="games.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> 返回
    </a>

    <div class="game-container">
        <h1 class="game-title">方块消除</h1>

        <div class="game-info">
            <div class="info-box">
                <div class="label">分数</div>
                <div class="value score-value" id="score">0</div>
            </div>
            <div class="info-box">
                <div class="label">关卡</div>
                <div class="value level-value" id="level">1</div>
            </div>
            <div class="info-box">
                <div class="label">步数</div>
                <div class="value" id="moves">30</div>
            </div>
        </div>

        <div class="game-board">
            <div class="board" id="board"></div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="restartGame()">
                <i class="fas fa-redo"></i> 重新开始
            </button>
            <button class="btn btn-glass" onclick="shuffleBoard()">
                <i class="fas fa-random"></i> 洗牌
            </button>
        </div>
    </div>

    <!-- 游戏结束弹窗 -->
    <div class="modal-overlay" id="gameOverModal">
        <div class="modal-content">
            <h2>🎉 游戏结束!</h2>
            <div class="final-score" id="finalScore">0</div>
            <div class="stats" id="gameStats">消除次数: 0 | 最高连击: 0</div>
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="restartGame()">
                    <i class="fas fa-redo"></i> 再玩一次
                </button>
                <button class="btn btn-glass" onclick="closeModal()">
                    <i class="fas fa-times"></i> 关闭
                </button>
            </div>
        </div>
    </div>

    <script>
        const BOARD_SIZE = 8;
        const BLOCK_TYPES = ['red', 'blue', 'green', 'yellow', 'purple', 'orange'];
        const BLOCK_ICONS = {
            red: '❤️',
            blue: '💎',
            green: '🌿',
            yellow: '⭐',
            purple: '🔮',
            orange: '🍊'
        };

        let board = [];
        let selectedCell = null;
        let score = 0;
        let moves = 30;
        let level = 1;
        let isProcessing = false;
        let totalMatches = 0;
        let maxCombo = 0;
        let currentCombo = 0;

        // 初始化游戏
        function initGame() {
            board = [];
            selectedCell = null;
            score = 0;
            moves = 30;
            level = 1;
            totalMatches = 0;
            maxCombo = 0;
            currentCombo = 0;
            isProcessing = false;

            updateUI();
            createBoard();
            renderBoard();
            
            // 初始消除可能的匹配
            setTimeout(() => {
                eliminateMatches(true);
            }, 100);
        }

        // 创建棋盘
        function createBoard() {
            for (let row = 0; row < BOARD_SIZE; row++) {
                board[row] = [];
                for (let col = 0; col < BOARD_SIZE; col++) {
                    let blockType;
                    do {
                        blockType = BLOCK_TYPES[Math.floor(Math.random() * BLOCK_TYPES.length)];
                    } while (wouldMatch(row, col, blockType));
                    board[row][col] = blockType;
                }
            }
        }

        // 检查是否会形成匹配
        function wouldMatch(row, col, type) {
            // 检查水平
            if (col >= 2 && board[row][col-1] === type && board[row][col-2] === type) {
                return true;
            }
            // 检查垂直
            if (row >= 2 && board[row-1][col] === type && board[row-2][col] === type) {
                return true;
            }
            return false;
        }

        // 渲染棋盘
        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';

            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const cell = document.createElement('div');
                    cell.className = `cell block-${board[row][col]}`;
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    cell.innerHTML = BLOCK_ICONS[board[row][col]];
                    cell.addEventListener('click', () => handleCellClick(row, col));
                    boardEl.appendChild(cell);
                }
            }
        }

        // 处理点击
        function handleCellClick(row, col) {
            if (isProcessing || moves <= 0) return;

            const clickedCell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);

            if (!selectedCell) {
                selectedCell = { row, col };
                clickedCell.classList.add('selected');
            } else {
                const { row: r1, col: c1 } = selectedCell;
                const { row: r2, col: c2 } = { row, col };

                // 检查是否是相邻单元格
                const isAdjacent = (Math.abs(r1 - r2) === 1 && c1 === c2) || 
                                  (Math.abs(c1 - c2) === 1 && r1 === r2);

                // 取消选择
                document.querySelector(`[data-row="${r1}"][data-col="${c1}"]`).classList.remove('selected');

                if (isAdjacent) {
                    // 交换方块
                    swapBlocks(r1, c1, r2, c2);
                } else {
                    // 选择新的单元格
                    selectedCell = { row, col };
                    clickedCell.classList.add('selected');
                    return;
                }

                selectedCell = null;
            }
        }

        // 交换方块
        async function swapBlocks(r1, c1, r2, c2) {
            isProcessing = true;

            // 交换
            const temp = board[r1][c1];
            board[r1][c1] = board[r2][c2];
            board[r2][c2] = temp;

            renderBoard();

            // 检查是否有匹配
            const matches = findMatches();

            if (matches.length > 0) {
                moves--;
                currentCombo = 0;
                await eliminateMatches();
            } else {
                // 交换回来
                await sleep(200);
                const temp = board[r1][c1];
                board[r1][c1] = board[r2][c2];
                board[r2][c2] = temp;
                renderBoard();
            }

            updateUI();
            isProcessing = false;

            // 检查游戏结束
            if (moves <= 0) {
                showGameOver();
            }
        }

        // 查找匹配
        function findMatches() {
            const matches = new Set();

            // 检查水平匹配
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE - 2; col++) {
                    const type = board[row][col];
                    if (type && board[row][col+1] === type && board[row][col+2] === type) {
                        matches.add(`${row},${col}`);
                        matches.add(`${row},${col+1}`);
                        matches.add(`${row},${col+2}`);
                    }
                }
            }

            // 检查垂直匹配
            for (let col = 0; col < BOARD_SIZE; col++) {
                for (let row = 0; row < BOARD_SIZE - 2; row++) {
                    const type = board[row][col];
                    if (type && board[row+1][col] === type && board[row+2][col] === type) {
                        matches.add(`${row},${col}`);
                        matches.add(`${row+1},${col}`);
                        matches.add(`${row+2},${col}`);
                    }
                }
            }

            return Array.from(matches).map(s => {
                const [r, c] = s.split(',').map(Number);
                return { row: r, col: c };
            });
        }

        // 消除匹配
        async function eliminateMatches(initial = false) {
            let matches = findMatches();
            currentCombo = 0;

            while (matches.length > 0) {
                currentCombo++;
                if (currentCombo > maxCombo) maxCombo = currentCombo;
                totalMatches++;

                // 显示连击文字
                if (currentCombo >= 2 && !initial) {
                    showComboText(currentCombo);
                }

                // 计算分数
                const matchScore = matches.length * 10 * currentCombo;
                score += matchScore;
                if (!initial) score += Math.floor(matches.length * 5);

                // 标记消除动画
                matches.forEach(({ row, col }) => {
                    const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
                    if (cell) cell.classList.add('matched');
                });

                await sleep(300);

                // 移除匹配的方块
                matches.forEach(({ row, col }) => {
                    board[row][col] = null;
                });

                renderBoard();
                await sleep(100);

                // 下落填充
                await dropBlocks();
                await fillEmptyBlocks();

                updateUI();
                matches = findMatches();
            }
        }

        // 方块下落
        async function dropBlocks() {
            for (let col = 0; col < BOARD_SIZE; col++) {
                let emptyRow = BOARD_SIZE - 1;

                for (let row = BOARD_SIZE - 1; row >= 0; row--) {
                    if (board[row][col] !== null) {
                        if (row !== emptyRow) {
                            board[emptyRow][col] = board[row][col];
                            board[row][col] = null;
                        }
                        emptyRow--;
                    }
                }
            }

            renderBoard();
            await sleep(150);
        }

        // 填充空位
        async function fillEmptyBlocks() {
            for (let col = 0; col < BOARD_SIZE; col++) {
                for (let row = 0; row < BOARD_SIZE; row++) {
                    if (board[row][col] === null) {
                        board[row][col] = BLOCK_TYPES[Math.floor(Math.random() * BLOCK_TYPES.length)];
                    }
                }
            }

            renderBoard();
            await sleep(150);
        }

        // 更新UI
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('moves').textContent = moves;

            // 步数警告
            const movesEl = document.getElementById('moves').parentElement;
            if (moves <= 5) {
                movesEl.classList.add('warning');
            } else {
                movesEl.classList.remove('warning');
            }
        }

        // 显示连击文字
        function showComboText(combo) {
            const text = document.createElement('div');
            text.className = 'combo-text';
            text.textContent = `${combo}连击!`;
            document.body.appendChild(text);
            setTimeout(() => text.remove(), 800);
        }

        // 游戏结束
        function showGameOver() {
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameStats').textContent = 
                `消除次数: ${totalMatches} | 最高连击: ${maxCombo}`;
            document.getElementById('gameOverModal').classList.add('active');
        }

        // 重新开始
        function restartGame() {
            closeModal();
            initGame();
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('gameOverModal').classList.remove('active');
        }

        // 洗牌
        function shuffleBoard() {
            if (isProcessing || moves <= 0) return;
            
            isProcessing = true;
            moves--;
            updateUI();

            // 随机打乱
            for (let i = 0; i < 100; i++) {
                const r1 = Math.floor(Math.random() * BOARD_SIZE);
                const c1 = Math.floor(Math.random() * BOARD_SIZE);
                const r2 = Math.floor(Math.random() * BOARD_SIZE);
                const c2 = Math.floor(Math.random() * BOARD_SIZE);

                const temp = board[r1][c1];
                board[r1][c1] = board[r2][c2];
                board[r2][c2] = temp;
            }

            renderBoard();

            // 消除匹配
            setTimeout(() => {
                eliminateMatches();
                isProcessing = false;

                if (moves <= 0) {
                    showGameOver();
                }
            }, 300);
        }

        // 工具函数
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // 启动游戏
        initGame();
    </script>
</body>
</html>
