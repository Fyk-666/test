<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃蛇</title>
  <style>
    :root {
      --bg-a: #071322;
      --bg-b: #0f2e4f;
      --bg-c: #183d63;
      --panel: rgba(255, 255, 255, 0.12);
      --panel-border: rgba(255, 255, 255, 0.35);
      --text: #ffffff;
      --text-soft: rgba(255, 255, 255, 0.86);
      --green: #52dd88;
      --food: #ff6b6b;
      --warn: #ffc857;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
      color: var(--text);
      font-family: "Trebuchet MS", "Microsoft YaHei", sans-serif;
      background: linear-gradient(165deg, var(--bg-a) 0%, var(--bg-b) 46%, var(--bg-c) 100%);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 10%, rgba(255,255,255,0.25), transparent 34%),
        radial-gradient(circle at 82% 86%, rgba(255,255,255,0.15), transparent 28%);
    }

    .page {
      width: min(980px, 100%);
      position: relative;
      z-index: 1;
    }

    .title {
      text-align: center;
      margin-bottom: 12px;
      text-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
    }

    .title h1 {
      font-size: clamp(1.45rem, 4vw, 2.4rem);
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    .title p {
      font-size: clamp(0.88rem, 2vw, 1.02rem);
      color: var(--text-soft);
    }

    .shell {
      border-radius: 18px;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      backdrop-filter: blur(8px);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.25);
      padding: 12px;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .hud-card {
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 12px;
      background: rgba(4, 18, 41, 0.45);
      padding: 8px 10px;
    }

    .hud-label {
      color: var(--text-soft);
      font-size: 0.74rem;
      margin-bottom: 4px;
    }

    .hud-value {
      font-weight: 700;
      font-size: 1.15rem;
      line-height: 1;
    }

    #speedText { color: var(--warn); }

    .board-wrap {
      position: relative;
      border-radius: 14px;
      border: 2px solid rgba(255, 255, 255, 0.45);
      overflow: hidden;
      background: rgba(11, 20, 39, 0.45);
    }

    #gameCanvas {
      width: 100%;
      height: auto;
      display: block;
      touch-action: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      pointer-events: none;
      background: rgba(8, 12, 28, 0.45);
      text-shadow: 0 3px 14px rgba(0, 0, 0, 0.35);
      transition: opacity 0.25s ease;
      padding: 10px;
    }

    .overlay.hidden { opacity: 0; }

    .overlay h2 {
      font-size: clamp(1.15rem, 3vw, 1.95rem);
      margin-bottom: 8px;
    }

    .overlay p {
      color: var(--text-soft);
      max-width: 560px;
      line-height: 1.55;
    }

    .ctrl {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tips {
      color: var(--text-soft);
      font-size: 0.92rem;
    }

    .btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 8px 14px;
      color: #fff;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .btn:hover { transform: translateY(-1px); filter: brightness(1.08); }
    .btn-start { background: linear-gradient(135deg, #4288ff 0%, #2f6fff 100%); }
    .btn-pause { background: linear-gradient(135deg, #ffbf5a 0%, #ff9f43 100%); }
    .btn-restart { background: linear-gradient(135deg, #ff7f7f 0%, #ef5350 100%); }

    .status {
      min-height: 1.4em;
      margin-top: 8px;
      color: var(--text-soft);
      font-size: 0.92rem;
    }

    @media (max-width: 760px) {
      .hud { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .ctrl { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="title">
      <h1>贪吃蛇</h1>
      <p>经典贪吃蛇游戏，吃掉食物让自己变长，不要撞墙！</p>
    </section>

    <section class="shell">
      <div class="hud">
        <div class="hud-card">
          <div class="hud-label">分数</div>
          <div class="hud-value" id="scoreText">0</div>
        </div>
        <div class="hud-card">
          <div class="hud-label">长度</div>
          <div class="hud-value" id="lengthText">3</div>
        </div>
        <div class="hud-card">
          <div class="hud-label">速度</div>
          <div class="hud-value" id="speedText">1.0x</div>
        </div>
        <div class="hud-card">
          <div class="hud-label">最高分</div>
          <div class="hud-value" id="bestText">0</div>
        </div>
      </div>

      <div class="board-wrap">
        <canvas id="gameCanvas" width="720" height="720"></canvas>
        <div class="overlay" id="overlay">
          <h2 id="overlayTitle">准备开始</h2>
          <p id="overlayDesc">按方向键或 WASD 控制移动。吃食物会增长并加分，撞墙或撞到自己会结束。</p>
        </div>
      </div>

      <div class="ctrl">
        <p class="tips">操作：方向键 / WASD，P 暂停，Enter 结束后重开。触屏可在画布上滑动换向。</p>
        <div class="btns">
          <button class="btn btn-start" id="startBtn">开始游戏</button>
          <button class="btn btn-pause" id="pauseBtn">暂停</button>
          <button class="btn btn-restart" id="restartBtn">重新开始</button>
        </div>
      </div>
      <p class="status" id="statusText">点击“开始游戏”进入挑战。</p>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreText = document.getElementById("scoreText");
    const lengthText = document.getElementById("lengthText");
    const speedText = document.getElementById("speedText");
    const bestText = document.getElementById("bestText");
    const statusText = document.getElementById("statusText");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayDesc = document.getElementById("overlayDesc");
    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const restartBtn = document.getElementById("restartBtn");

    const GRID = 24;
    const SIZE = canvas.width / GRID;
    const BASE_TICK = 150;
    const BEST_KEY = "snake_best_v1";

    const state = {
      running: false,
      paused: false,
      gameOver: false,
      score: 0,
      best: Number(localStorage.getItem(BEST_KEY) || 0),
      tickMs: BASE_TICK,
      acc: 0,
      lastTs: 0
    };

    let snake = [];
    let dir = { x: 1, y: 0 };
    let nextDir = { x: 1, y: 0 };
    let food = null;

    const swipe = { active: false, x: 0, y: 0, id: null };

    function setOverlay(title, desc, show) {
      overlayTitle.textContent = title;
      overlayDesc.textContent = desc;
      overlay.classList.toggle("hidden", !show);
    }

    function setStatus(text) {
      statusText.textContent = text;
    }

    function updateHud() {
      scoreText.textContent = String(state.score);
      lengthText.textContent = String(snake.length);
      speedText.textContent = `${(BASE_TICK / state.tickMs).toFixed(1)}x`;
      bestText.textContent = String(state.best);
    }

    function createInitialSnake() {
      snake = [
        { x: 8, y: 12 },
        { x: 7, y: 12 },
        { x: 6, y: 12 }
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
    }

    function randomEmptyCell() {
      const occupied = new Set(snake.map((s) => `${s.x},${s.y}`));
      const empties = [];
      for (let y = 0; y < GRID; y += 1) {
        for (let x = 0; x < GRID; x += 1) {
          if (!occupied.has(`${x},${y}`)) empties.push({ x, y });
        }
      }
      return empties.length ? empties[Math.floor(Math.random() * empties.length)] : null;
    }

    function spawnFood() {
      const cell = randomEmptyCell();
      if (!cell) {
        endGame("你填满了整个地图，完美通关！");
        return false;
      }
      food = cell;
      return true;
    }

    function resetGame() {
      state.running = false;
      state.paused = false;
      state.gameOver = false;
      state.score = 0;
      state.tickMs = BASE_TICK;
      state.acc = 0;
      state.lastTs = 0;
      createInitialSnake();
      spawnFood();
      pauseBtn.textContent = "暂停";
      setOverlay("准备开始", "按方向键或 WASD 控制移动。吃食物会增长并加分，撞墙或撞到自己会结束。", true);
      setStatus("点击“开始游戏”进入挑战。");
      updateHud();
    }

    function startGame() {
      if (state.gameOver) resetGame();
      if (!state.running) {
        state.running = true;
        state.paused = false;
        setOverlay("", "", false);
        setStatus("开始移动：保持节奏，别撞墙。");
      }
    }

    function togglePause() {
      if (!state.running || state.gameOver) return;
      state.paused = !state.paused;
      pauseBtn.textContent = state.paused ? "继续" : "暂停";
      if (state.paused) {
        setOverlay("已暂停", "按 P 或点击“继续”恢复。", true);
        setStatus("游戏暂停中。");
      } else {
        setOverlay("", "", false);
        setStatus("继续前进。");
      }
    }

    function endGame(reason) {
      state.gameOver = true;
      state.running = false;
      if (state.score > state.best) {
        state.best = state.score;
        localStorage.setItem(BEST_KEY, String(state.best));
      }
      updateHud();
      setOverlay("游戏结束", "按 Enter 或“重新开始”再来一局。", true);
      setStatus(reason);
    }

    function setDirection(dx, dy) {
      if (state.paused || state.gameOver) return;
      if (!state.running) startGame();
      if (dx === -dir.x && dy === -dir.y) return;
      nextDir = { x: dx, y: dy };
    }

    function step() {
      dir = nextDir;
      const head = snake[0];
      const newHead = { x: head.x + dir.x, y: head.y + dir.y };

      if (newHead.x < 0 || newHead.x >= GRID || newHead.y < 0 || newHead.y >= GRID) {
        endGame("撞墙了，挑战结束。");
        return;
      }

      const bodyHit = snake.some((s, idx) => idx !== snake.length - 1 && s.x === newHead.x && s.y === newHead.y);
      if (bodyHit) {
        endGame("撞到自己了，挑战结束。");
        return;
      }

      snake.unshift(newHead);
      if (newHead.x === food.x && newHead.y === food.y) {
        state.score += 10;
        state.tickMs = Math.max(72, BASE_TICK - Math.floor(state.score / 8));
        spawnFood();
        setStatus("吃到了！继续。");
      } else {
        snake.pop();
      }
      updateHud();
    }

    function drawBackground() {
      const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
      g.addColorStop(0, "#0b2a4d");
      g.addColorStop(1, "#071428");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.lineWidth = 1;
      for (let i = 0; i <= GRID; i += 1) {
        const p = i * SIZE;
        ctx.beginPath();
        ctx.moveTo(p, 0);
        ctx.lineTo(p, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, p);
        ctx.lineTo(canvas.width, p);
        ctx.stroke();
      }
    }

    function drawFood() {
      if (!food) {
        if (!spawnFood()) return;
      }
      const x = food.x * SIZE + SIZE / 2;
      const y = food.y * SIZE + SIZE / 2;
      const pulse = 0.92 + Math.sin(performance.now() * 0.01) * 0.08;
      const r = (SIZE * 0.36) * pulse;

      ctx.fillStyle = "rgba(255, 107, 107, 0.26)";
      ctx.beginPath();
      ctx.arc(x, y, r * 1.6, 0, Math.PI * 2);
      ctx.fill();

      const grad = ctx.createRadialGradient(x - r * 0.2, y - r * 0.3, 2, x, y, r);
      grad.addColorStop(0, "#ffe1e1");
      grad.addColorStop(0.55, "#ff7f7f");
      grad.addColorStop(1, "#ff4747");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(255,255,255,0.8)";
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.arc(x, y, r * 0.5, 0, Math.PI * 2);
      ctx.stroke();

      ctx.strokeStyle = "#704214";
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(x, y - r + 1);
      ctx.lineTo(x, y - r - 7);
      ctx.stroke();
    }

    function drawSnake() {
      for (let i = snake.length - 1; i >= 0; i -= 1) {
        const s = snake[i];
        const x = s.x * SIZE + 2;
        const y = s.y * SIZE + 2;
        const w = SIZE - 4;
        const h = SIZE - 4;
        const isHead = i === 0;

        const color = isHead ? "#73f8a8" : `rgb(${64 + Math.min(i * 3, 80)}, ${194 + Math.min(i * 2, 40)}, ${122 + Math.min(i, 15)})`;
        ctx.fillStyle = color;
        ctx.fillRect(x, y, w, h);

        if (isHead) {
          ctx.fillStyle = "#0d1a24";
          const eyeOffsetX = dir.x === 0 ? 5 : (dir.x > 0 ? 8 : 4);
          const eyeOffsetY = dir.y === 0 ? 5 : (dir.y > 0 ? 8 : 4);
          ctx.fillRect(x + eyeOffsetX, y + eyeOffsetY, 3, 3);
          ctx.fillRect(x + w - eyeOffsetX - 3, y + h - eyeOffsetY - 3, 3, 3);
        }
      }
    }

    function draw() {
      drawBackground();
      drawFood();
      drawSnake();
    }

    function loop(ts) {
      if (!state.lastTs) state.lastTs = ts;
      const dt = ts - state.lastTs;
      state.lastTs = ts;

      if (state.running && !state.paused && !state.gameOver) {
        state.acc += dt;
        while (state.acc >= state.tickMs) {
          state.acc -= state.tickMs;
          step();
          if (state.gameOver) break;
        }
      }

      draw();
      requestAnimationFrame(loop);
    }

    function pointerPos(ev) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: ev.clientX - rect.left,
        y: ev.clientY - rect.top
      };
    }

    function onPointerDown(ev) {
      const p = pointerPos(ev);
      swipe.active = true;
      swipe.x = p.x;
      swipe.y = p.y;
      swipe.id = ev.pointerId;
      canvas.setPointerCapture(ev.pointerId);
      if (!state.running) startGame();
      ev.preventDefault();
    }

    function onPointerMove(ev) {
      if (!swipe.active || swipe.id !== ev.pointerId) return;
      const p = pointerPos(ev);
      const dx = p.x - swipe.x;
      const dy = p.y - swipe.y;
      if (Math.hypot(dx, dy) < 18) return;

      if (Math.abs(dx) > Math.abs(dy)) {
        setDirection(dx > 0 ? 1 : -1, 0);
      } else {
        setDirection(0, dy > 0 ? 1 : -1);
      }
      swipe.x = p.x;
      swipe.y = p.y;
    }

    function onPointerUp(ev) {
      if (swipe.id !== ev.pointerId) return;
      swipe.active = false;
      swipe.id = null;
      try {
        canvas.releasePointerCapture(ev.pointerId);
      } catch (_) {}
    }

    startBtn.addEventListener("click", startGame);
    pauseBtn.addEventListener("click", togglePause);
    restartBtn.addEventListener("click", resetGame);
    canvas.addEventListener("pointerdown", onPointerDown);
    canvas.addEventListener("pointermove", onPointerMove);
    canvas.addEventListener("pointerup", onPointerUp);
    canvas.addEventListener("pointercancel", onPointerUp);
    canvas.addEventListener("pointerleave", onPointerUp);

    document.addEventListener("keydown", (ev) => {
      if (ev.code === "ArrowUp" || ev.code === "KeyW") setDirection(0, -1);
      else if (ev.code === "ArrowDown" || ev.code === "KeyS") setDirection(0, 1);
      else if (ev.code === "ArrowLeft" || ev.code === "KeyA") setDirection(-1, 0);
      else if (ev.code === "ArrowRight" || ev.code === "KeyD") setDirection(1, 0);
      else if (ev.code === "KeyP") togglePause();
      else if (ev.code === "Enter" && state.gameOver) {
        resetGame();
        startGame();
      }
    });

    resetGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
